<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>(function(){var days=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];var theme=days[new Date().getDay()]||'monday';try{var raw=localStorage.getItem('yuzuThemeOverride');if(raw){var saved=JSON.parse(raw);if(saved&&saved.themeKey&&saved.expiresAt&&Date.now()<Number(saved.expiresAt)){theme=saved.themeKey}else{localStorage.removeItem('yuzuThemeOverride')}}}catch(e){}document.documentElement.setAttribute('data-yuzu-theme',theme);})();</script>
  <link rel="stylesheet" href="style.css?v=156" />
  <title>迷言案を送る｜柚胡椒の秘密基地</title>
  <meta name="description" content="柚胡椒ファミリーの迷言集へ載せたい迷言案を送るためのフォームです。" />
  <meta name="robots" content="index, follow" />
</head>
<body>
  <div class="cursor-light" id="cursorLight"></div>
  <div class="bg-glow glow-a"></div>
  <div class="bg-glow glow-b"></div>
  <div class="stars" aria-hidden="true"></div>
  <div class="shooting-stars" aria-hidden="true"><span></span><span></span><span></span></div>
  <div class="particle-layer" id="particleLayer" aria-hidden="true"></div>

  <header class="topbar">
    <a class="schedule-btn" href="meigen.html">← 迷言集に戻る</a>
  </header>

  <main class="page sub-page meigen-submit-page">
    <section class="hero sub-hero">
      <p class="eyebrow">- MEIGEN POST -</p>
      <h1 class="sub-page-title">📮 迷言案を送る</h1>
      <p class="catchcopy">「これ迷言じゃない？」と思ったひとことを、柚胡椒へ送れるフォームです。</p>
    </section>

    <section class="quote-room-grid meigen-room-grid">
      <article class="card quote-room-card meigen-submit-card">
        <div>
          <p class="section-kicker">POST FORM</p>
          <h2>🗯️ 投稿案フォーム</h2>
          <p>送られた内容はすぐ公開されません。柚胡椒が確認して、載せるものだけ迷言集へ追加します。</p>
          <form class="meigen-form" id="meigenSubmitForm">
            <label>
              <span>迷言</span>
              <textarea name="text" rows="3" placeholder="迷言を入力" required></textarea>
            </label>
            <div class="meigen-form-grid">
              <label>
                <span>発言者</span>
                <input name="speaker" type="text" placeholder="柚胡椒 / とある住人さん / 匿名希望" />
              </label>
              <label>
                <span>出た場所</span>
                <input name="place" type="text" placeholder="配信中 / コメント欄 / Discord" />
              </label>
              <label>
                <span>日付</span>
                <input name="date" type="text" placeholder="分かればでOK" />
              </label>
              <label>
                <span>投稿者名</span>
                <input name="sender" type="text" placeholder="返信がほしい名前 / 匿名OK" />
              </label>
            </div>
            <label>
              <span>補足</span>
              <input name="memo" type="text" placeholder="どんな流れで出たか、必要なら書いてね" />
            </label>
            <button class="mini-btn" type="submit" id="meigenSubmitSendBtn">送信</button>
            <p class="meigen-submit-status" id="meigenSubmitStatus" aria-live="polite"></p>
          </form>

          <div class="meigen-submit-success" id="meigenSubmitSuccess" hidden>
            <p class="section-kicker">POST COMPLETE</p>
            <h2>投稿案を受け付けました</h2>
            <p>送ってくれた迷言案は柚胡椒が確認して、載せるものだけ迷言集へ追加します。</p>
            <a class="mini-btn" href="index.html">秘密基地のホームに戻る</a>
          </div>
        </div>
      </article>

    </section>
  </main>

  <footer>
    <p>© 2026 柚胡椒の秘密基地 All Rights Reserved.</p>
  </footer>

  <script src="script.js?v=156" defer></script>
  <script src="meigen-data.js?v=119" defer></script>
  <script src="meigen.js?v=119" defer></script>
</body>
</html>
