<?xml version="1.0" encoding="UTF-8"?>
<svg aria-labelledby="title desc" role="img" viewBox="0 0 640 420" xmlns="http://www.w3.org/2000/svg">
<title>ノートPCのオリジナルイメージ画像</title>
<desc>柚胡椒の秘密基地用に作成した、商品公式画像ではないカテゴリイメージです。</desc>
<defs>
<linearGradient id="c" y2="1">
<stop stop-color="#2b1152" offset="0"/>
<stop stop-color="#10051f" offset=".52"/>
<stop stop-color="#041a2e" offset="1"/>
</linearGradient>
<radialGradient id="b" cx=".52" cy=".4" r=".72">
<stop stop-color="#70d6ff" stop-opacity=".34" offset="0"/>
<stop stop-color="#a855f7" stop-opacity=".2" offset=".38"/>
<stop stop-opacity="0" offset="1"/>
</radialGradient>
<filter id="a" x="-20%" y="-20%" width="140%" height="140%">
<feGaussianBlur result="blur" stdDeviation="7"/>
