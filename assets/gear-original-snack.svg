<?xml version="1.0" encoding="UTF-8"?>
<svg aria-labelledby="title desc" role="img" viewBox="0 0 640 420" xmlns="http://www.w3.org/2000/svg">
  <title>おつまみのオリジナルイメージ画像</title>
  <desc>柚胡椒の秘密基地用に作成した、商品公式画像ではない分かりやすいカテゴリイメージです。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2b1152"/>
      <stop offset=".52" stop-color="#10051f"/>
      <stop offset="1" stop-color="#041a2e"/>
    </linearGradient>
    <radialGradient id="glow" cx=".50" cy=".38" r=".72">
      <stop offset="0" stop-color="#70d6ff" stop-opacity=".30"/>
      <stop offset=".42" stop-color="#a855f7" stop-opacity=".20"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .main{filter:url(#softGlow)}
      .label{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',Meiryo,Arial,sans-serif;font-weight:900;fill:#f8ecff;text-anchor:middle;letter-spacing:2px}
      .sub{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',Meiryo,Arial,sans-serif;font-weight:800;fill:#ffd166;text-anchor:middle;letter-spacing:1px}
    </style>
  </defs>
  <rect width="640" height="420" rx="40" fill="url(#bg)"/>
  <rect x="20" y="20" width="600" height="380" rx="32" fill="url(#glow)"/>
  <path d="M58 326 C160 258 240 394 346 320 C430 262 484 300 582 248" fill="none" opacity=".48" stroke="#a855f7" stroke-width="5"/>
  <path d="M58 92 C150 46 225 112 313 76 C408 38 470 76 582 44" fill="none" opacity=".42" stroke="#70d6ff" stroke-width="4"/>
  
      <g class="main" transform="translate(0,4)">
        <ellipse cx="320" cy="238" rx="142" ry="34" fill="#2a133e" stroke="#ffd166" stroke-width="8"/>
        <path d="M190 220 Q320 322 450 220 L420 302 Q320 362 220 302 Z" fill="#7c3b1e" stroke="#ffd166" stroke-width="8"/>
        <circle cx="256" cy="202" r="28" fill="#e9a13c" stroke="#fff0b8" stroke-width="5"/>
        <circle cx="318" cy="188" r="30" fill="#f0c85a" stroke="#fff0b8" stroke-width="5"/>
        <circle cx="382" cy="204" r="27" fill="#e9a13c" stroke="#fff0b8" stroke-width="5"/>
        <path d="M242 166 Q260 148 280 166 M357 166 Q376 148 396 166" fill="none" stroke="#e8fbff" stroke-width="7" stroke-linecap="round"/>
      </g>
  <text class="label" x="320" y="370" font-size="36">おつまみ</text>
  <text class="sub" x="320" y="398" font-size="18">配信中の軽食</text>
</svg>
