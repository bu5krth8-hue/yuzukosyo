<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">おつまみのオリジナルイメージ画像</title>
  <desc id="desc">柚胡椒の秘密基地用に作成した、商品公式画像ではないカテゴリイメージです。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b1152"/>
      <stop offset=".52" stop-color="#10051f"/>
      <stop offset="1" stop-color="#041a2e"/>
    </linearGradient>
    <radialGradient id="glow" cx=".52" cy=".40" r=".72">
      <stop offset="0" stop-color="#70d6ff" stop-opacity=".34"/>
      <stop offset=".38" stop-color="#a855f7" stop-opacity=".20"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="640" height="420" rx="40" fill="url(#bg)"/>
  <rect x="20" y="20" width="600" height="380" rx="32" fill="url(#glow)"/>
  <path d="M58 328 C160 260 240 396 346 322 C430 264 484 302 582 250" fill="none" stroke="#a855f7" stroke-width="5" opacity=".55"/>
  <path d="M58 92 C150 46 225 112 313 76 C408 38 470 76 582 44" fill="none" stroke="#70d6ff" stroke-width="4" opacity=".45"/>
  <g filter="url(#softGlow)">
    
        <ellipse cx="320" cy="250" rx="120" ry="42" fill="rgba(255,255,255,.16)" stroke="#ffd166" stroke-width="6"/>
        <path d="M205 228 Q320 310 435 228 L405 285 Q320 335 235 285 Z" fill="rgba(255,209,102,.20)" stroke="#ffd166" stroke-width="5"/>
        <circle cx="270" cy="215" r="22" fill="#f4a261"/><circle cx="318" cy="205" r="20" fill="#e9c46a"/><circle cx="365" cy="218" r="21" fill="#f4a261"/>
        <path d="M255 185 q18 -18 40 0" fill="none" stroke="#d8f3ff" stroke-width="5" stroke-linecap="round" opacity=".8"/>
        <path d="M342 185 q18 -18 40 0" fill="none" stroke="#d8f3ff" stroke-width="5" stroke-linecap="round" opacity=".8"/>
        
  </g>
  <text x="320" y="374" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="900" letter-spacing="5" fill="#d8f3ff">SNACK</text>
  <text x="320" y="398" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#ffd166" opacity=".9">ORIGINAL IMAGE</text>
</svg>