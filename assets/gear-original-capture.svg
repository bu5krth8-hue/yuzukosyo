<path d="m245 310h150" opacity=".8" stroke="#a855f7" stroke-linecap="round" stroke-width="8"/>
<circle cx="256" cy="166" r="10" fill="#70d6ff"/>
<circle cx="386" cy="166" r="10" fill="#ffd166"/>
</g>
<text x="320" y="374" fill="#d8f3ff" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="900" letter-spacing="5" text-anchor="middle">CAPTURE</text>
<text x="320" y="398" fill="#ffd166" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="2" opacity=".9" text-anchor="middle">ORIGINAL IMAGE</text>
